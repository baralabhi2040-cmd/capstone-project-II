services:
  - type: web
    name: phishguard-app
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: PhishGuard API
      - key: APP_VERSION
        value: 1.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: phishguard-db
          property: connectionString
      - key: RELOAD
        value: "false"
      - key: EMAIL_DEBUG_PREVIEW
        value: "false"
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: SMTP_FROM_NAME
        value: PhishGuard
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  - name: phishguard-db
    databaseName: phishguard
    user: phishguard
    plan: free
