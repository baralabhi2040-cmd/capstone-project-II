services:
  - type: web
    name: phishguard-app
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: PhishGuard API
      - key: APP_VERSION
        value: 1.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: phishguard-db
          property: connectionString
      - key: RELOAD
        value: "false"
      - key: SERVE_FRONTEND
        value: "false"
      - key: FRONTEND_BASE_URL
        value: https://capstone-project-ii.vercel.app
      - key: BACKEND_BASE_URL
        value: https://capstone-project-ii-0phn.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://capstone-project-ii.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: ALLOWED_ORIGIN_REGEX
        value: ^https://capstone-project-ii(?:-[a-z0-9-]+)?\.vercel\.app$
      - key: EMAIL_DEBUG_PREVIEW
        value: "false"
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: SMTP_FROM_NAME
        value: PhishGuard
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  - name: phishguard-db
    databaseName: phishguard
    user: phishguard
    plan: free
